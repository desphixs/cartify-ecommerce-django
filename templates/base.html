<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cartify - Your Premium E-Commerce{% endblock %}</title>
    
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="flex flex-col min-h-screen text-gray-800">
    
    <!-- Navigation Bar -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <!-- Logo -->
            <div class="flex-shrink-0 flex items-center">
                <a href="/" class="text-2xl font-bold text-indigo-600 tracking-tight flex items-center gap-2">
                    <i class="fa-solid fa-cart-shopping"></i> Cartify
                </a>
            </div>
            
            <!-- Desktop Menu -->
            <nav class="hidden md:flex space-x-8">
                <a href="/" class="text-gray-600 hover:text-indigo-600 font-medium transition-colors">Home</a>
                <a href="#" class="text-gray-600 hover:text-indigo-600 font-medium transition-colors">Shop</a>
            </nav>

            <!-- User Actions -->
            <div class="flex items-center space-x-4">
                {% if user.is_authenticated %}
                    <a href="#" class="text-gray-500 hover:text-indigo-600 transition-colors">
                        <i class="fa-solid fa-cart-shopping text-xl"></i>
                    </a>
                    <a href="{% url 'dashboard' %}" class="text-gray-600 hover:text-indigo-600 font-medium transition-colors">Dashboard</a>
                    <a href="{% url 'logout' %}" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}" class="text-gray-600 hover:text-indigo-600 font-medium transition-colors">Login</a>
                    <a href="{% url 'register' %}" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-auto">
        <div class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
            <div class="md:flex md:items-center md:justify-between">
                <div class="flex justify-center space-x-6 md:order-2">
                    <a href="#" class="text-gray-400 hover:text-gray-500">
                        <span class="sr-only">Facebook</span>
                        <i class="fa-brands fa-facebook text-xl"></i>
                    </a>
                    <a href="#" class="text-gray-400 hover:text-gray-500">
                        <span class="sr-only">Twitter</span>
                        <i class="fa-brands fa-twitter text-xl"></i>
                    </a>
                    <a href="#" class="text-gray-400 hover:text-gray-500">
                        <span class="sr-only">GitHub</span>
                        <i class="fa-brands fa-github text-xl"></i>
                    </a>
                </div>
                <div class="mt-8 md:mt-0 md:order-1">
                    <p class="text-center text-base text-gray-500">
                        &copy; 2026 Cartify, Inc. All rights reserved.
                    </p>
                </div>
            </div>
        </div>
    </footer>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
