{% extends 'base.html' %}
{% block title %}Create Your Account - Cartify{% endblock %}

{% block content %}
<div class="flex items-center justify-center p-4 min-h-[80vh] relative overflow-hidden select-none">
    <!-- Main registration card container -->
    <div class="w-full max-w-md bg-white border border-gray-200 rounded-2xl p-8 shadow-xl relative z-10">
        <!-- Brand Logo / Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-indigo-600 rounded-xl mb-3 shadow-sm">
                <i class="fa-solid fa-shield-halved text-white text-xl"></i>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tight text-gray-900">
                Join Cartify
            </h1>
            <p class="text-gray-500 text-sm mt-1.5 font-medium">Create your secure, logic-first account today.</p>
        </div>

        <!-- Dynamic Error Alert box: Rendered only if Django views pass an error string -->
        {% if error %}
        <div class="mb-6 p-4 bg-red-50 border border-red-200 rounded-xl flex items-start space-x-3 text-red-800 text-sm animate-shake">
            <i class="fa-solid fa-circle-exclamation mt-0.5 text-red-500"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <!-- Registration Form -->
        <form method="POST" action="" class="space-y-5">
            {% csrf_token %}

            <!-- Email Input Field -->
            <div>
                <label for="email" class="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-2">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400">
                        <i class="fa-regular fa-envelope"></i>
                    </span>
                    <input type="email" id="email" name="email" required placeholder="name@example.com"
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:border-indigo-600 focus:ring-2 focus:ring-indigo-600/10 transition-all duration-200 text-sm font-medium">
                </div>
            </div>

            <!-- Username Input Field -->
            <div>
                <label for="username" class="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-2">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400">
                        <i class="fa-regular fa-user"></i>
                    </span>
                    <input type="text" id="username" name="username" required placeholder="choose a nickname"
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:border-indigo-600 focus:ring-2 focus:ring-indigo-600/10 transition-all duration-200 text-sm font-medium">
                </div>
            </div>

            <!-- Password Input Field -->
            <div>
                <label for="password" class="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-2">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="password" name="password" required placeholder="••••••••"
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:border-indigo-600 focus:ring-2 focus:ring-indigo-600/10 transition-all duration-200 text-sm font-medium">
                </div>
            </div>

            <!-- Submit Register Button -->
            <button type="submit"
                class="w-full py-3 px-4 mt-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl transition-all duration-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-600 focus:ring-offset-2 focus:ring-offset-white text-sm">
                Create Account <i class="fa-solid fa-arrow-right ml-2 text-xs"></i>
            </button>
        </form>

        <!-- Redirect to Login Page Link -->
        <p class="text-center text-gray-500 text-sm mt-8 font-medium">
            Already have an account?
            <a href="/login/" class="text-indigo-600 hover:text-indigo-800 font-semibold transition-colors duration-150 ml-1">Sign In</a>
        </p>
    </div>
</div>
{% endblock %}
